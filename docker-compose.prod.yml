services:
  app:
    image: ${GHCR_IMAGE:?Set GHCR_IMAGE in .env}
    container_name: minicms-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
