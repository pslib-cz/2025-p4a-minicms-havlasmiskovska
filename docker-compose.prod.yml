services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: minicms-app
        restart: unless-stopped
        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL_DOCKER: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "3001:3000"
        networks:
            - vps-network
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "require('node:http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode < 500 ? 0 : 1)).on('error',()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 20s

    db:
        image: postgres:16
        container_name: minicms-db
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - "127.0.0.1:5434:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - vps-network

networks:
    vps-network:

volumes:
    postgres_data:
