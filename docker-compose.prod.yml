services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: minicms-app
        restart: unless-stopped
        env_file:
            - .env
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "127.0.0.1:3000:3000"
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 20s

