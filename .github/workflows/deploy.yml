name: Deploy App to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          source: ".dockerignore,Dockerfile,docker-compose.prod.yml,next.config.ts,package.json,package-lock.json,tsconfig.json,prisma,public,src,deploy"
          target: "/tmp/minicms-deploy"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          envs: CERTBOT_EMAIL,ENV_FILE
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/minicms-app
            sudo cp -r /tmp/minicms-deploy/* /opt/minicms-app/

            printf '%s\n' "${ENV_FILE}" | sed 's/\r$//' | sudo tee /opt/minicms-app/.env > /dev/null

            cd /opt/minicms-app
            sudo CERTBOT_EMAIL="${CERTBOT_EMAIL}" bash ./deploy/vps/deploy.sh