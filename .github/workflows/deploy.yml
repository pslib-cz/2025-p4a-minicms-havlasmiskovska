name: Deploy App to VPS

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: deploy-production
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    preflight:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

    build-and-deploy:
        runs-on: ubuntu-latest
        needs: preflight
        environment: production
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Prepare clean staging directory on VPS
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
                  script: |
                      set -euo pipefail
                      rm -rf /tmp/minicms-deploy
                      mkdir -p /tmp/minicms-deploy

            - name: Copy deployment files to VPS
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
                  source: ".dockerignore,Dockerfile,docker-compose.prod.yml,next.config.ts,package.json,package-lock.json,prisma.config.ts,tsconfig.json,prisma,public,src,deploy,data"
                  target: "/tmp/minicms-deploy"

            - name: Deploy over SSH
              uses: appleboy/ssh-action@v1.2.0
              env:
                  ENV_FILE: ${{ secrets.ENV_FILE }}
                  DEPLOY_COMMIT: ${{ github.sha }}
                  APP_DIR: /var/www/cms
                  DOMAIN: cms.144-91-77-107.sslip.io
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
                  envs: ENV_FILE,DEPLOY_COMMIT,APP_DIR,DOMAIN
                  script: |
                      set -euo pipefail

                      require_file() {
                        local file_path="$1"
                        if [[ ! -f "${file_path}" ]]; then
                          echo "ERROR: Required deploy file is missing: ${file_path}" >&2
                          exit 1
                        fi
                      }

                      require_env() {
                        local key="$1"
                        if ! grep -q "^${key}=" "${APP_DIR}/.env"; then
                          echo "ERROR: Required .env entry is missing after sanitization: ${key}" >&2
                          exit 1
                        fi
                      }

                      sudo mkdir -p "${APP_DIR}"

                      echo "Deploying commit: ${DEPLOY_COMMIT}"

                      # Clean app directory to avoid stale files from old commits while preserving .env.
                      sudo find "${APP_DIR}" -mindepth 1 -maxdepth 1 \
                        ! -name ".env" \
                        -exec rm -rf {} +

                      # Copy all files including dotfiles (e.g. .dockerignore) from staged deploy payload.
                      require_file /tmp/minicms-deploy/package.json
                      require_file /tmp/minicms-deploy/prisma.config.ts
                      require_file '/tmp/minicms-deploy/src/app/(public)/page.tsx'

                      sudo cp -a /tmp/minicms-deploy/. "${APP_DIR}/"
                      printf '%s\n' "${DEPLOY_COMMIT}" | sudo tee "${APP_DIR}/.deploy-commit" > /dev/null

                      # Build a clean .env from ENV_FILE secret. Keep blank lines, comments,
                      # and KEY=VALUE assignments; drop accidental editor/status lines.
                      printf '%s\n' "${ENV_FILE}" \
                        | sed 's/\r$//' \
                        | awk '
                            /^[[:space:]]*$/ { print; next }
                            /^[[:space:]]*#/ { print; next }
                            /^[A-Za-z_][A-Za-z0-9_]*=.*/ { print; next }
                          ' \
                        | sudo tee "${APP_DIR}/.env" > /dev/null

                      # Fail fast if required entries are missing after sanitization.
                      require_env POSTGRES_USER
                      require_env POSTGRES_PASSWORD
                      require_env POSTGRES_DB
                      require_env NEXTAUTH_SECRET

                      # Copy docker-compose config and prepare deployment
                      sudo cp "${APP_DIR}/docker-compose.prod.yml" "${APP_DIR}/docker-compose.yml"

                      # Check NEXTAUTH_URL configuration
                      nextauth_url="$(sudo grep -E '^NEXTAUTH_URL=' "${APP_DIR}/.env" | tail -n1 | cut -d'=' -f2- || true)"
                      if [[ -z "${nextauth_url}" ]]; then
                          echo "WARNING: NEXTAUTH_URL is missing in ${APP_DIR}/.env. NextAuth OAuth callback may fail."
                      elif [[ "${nextauth_url}" =~ localhost|127\.0\.0\.1 ]]; then
                          echo "WARNING: NEXTAUTH_URL points to localhost in ${APP_DIR}/.env (${nextauth_url})."
                          echo "Set NEXTAUTH_URL to the public HTTPS domain (for example: https://${DOMAIN})."
                      fi

                      # Build and deploy Docker containers
                      sudo docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" config -q

                      # Ensure the POSTGRES_USER role and database exist before starting the app.
                      # The postgres image only creates them on first init; pre-existing volumes skip this.
                      DB_USER="$(sudo grep -E '^POSTGRES_USER=' "${APP_DIR}/.env" | tail -n1 | cut -d'=' -f2-)"
                      DB_PASS="$(sudo grep -E '^POSTGRES_PASSWORD=' "${APP_DIR}/.env" | tail -n1 | cut -d'=' -f2-)"
                      DB_NAME="$(sudo grep -E '^POSTGRES_DB=' "${APP_DIR}/.env" | tail -n1 | cut -d'=' -f2-)"

                      echo "=== Ensuring DB role '${DB_USER}' and database '${DB_NAME}' exist ==="
                      sudo docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" up -d db

                      # Wait for database to be healthy instead of a fixed sleep
                      echo "Waiting for database to be healthy..."
                      db_wait=0
                      db_max=30
                      while [ "${db_wait}" -lt "${db_max}" ]; do
                        db_health="$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' minicms-db 2>/dev/null || echo unknown)"
                        if [ "${db_health}" = "healthy" ]; then
                          echo "Database is healthy."
                          break
                        fi
                        sleep 2
                        db_wait=$((db_wait + 1))
                      done
                      if [ "${db_wait}" -ge "${db_max}" ]; then
                        echo "ERROR: Database did not become healthy in time." >&2
                        sudo docker logs minicms-db --tail=30 || true
                        exit 1
                      fi

                      # Determine superuser name: POSTGRES_USER is the superuser in the Docker postgres image.
                      # Fall back to "postgres" only if POSTGRES_USER was never set (default image behavior).
                      PG_SUPERUSER="${DB_USER}"

                      # Verify we can connect as the superuser via local socket (trust auth)
                      sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c "SELECT 1;" > /dev/null 2>&1 || {
                        echo "Cannot connect as '${PG_SUPERUSER}'; trying 'postgres' as fallback..."
                        PG_SUPERUSER="postgres"
                        sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c "SELECT 1;" > /dev/null || {
                          echo "ERROR: Cannot connect to database as either '${DB_USER}' or 'postgres'." >&2
                          exit 1
                        }
                      }
                      echo "Connected to database as '${PG_SUPERUSER}'."

                      # Create the role if it doesn't exist — fail deployment on error
                      if [ "${PG_SUPERUSER}" != "${DB_USER}" ]; then
                        sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c \
                          "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '${DB_USER}') THEN CREATE ROLE \"${DB_USER}\" LOGIN PASSWORD '${DB_PASS}'; END IF; END \$\$;"
                      fi

                      # Update password to match current .env (in case it changed since volume was created)
                      sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c \
                        "ALTER ROLE \"${DB_USER}\" WITH LOGIN PASSWORD '${DB_PASS}';"

                      # Grant superuser so Prisma migrations work
                      sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c \
                        "ALTER ROLE \"${DB_USER}\" WITH SUPERUSER;"

                      # Create the database if missing
                      sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c \
                        "SELECT 1 FROM pg_database WHERE datname = '${DB_NAME}';" | grep -q 1 || \
                        sudo docker exec minicms-db psql -U "${PG_SUPERUSER}" -c \
                          "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_USER}\";"

                      # Run Prisma migrations before starting the app
                      echo "Running Prisma migrations..."
                      MIGRATE_DB_URL="postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}?schema=public"
                      sudo docker run --rm \
                        --network vps-network \
                        -e DB_URL="${MIGRATE_DB_URL}" \
                        -v "${APP_DIR}/prisma:/app/prisma" \
                        -w /app \
                        node:20-alpine \
                        sh -c "
                          npm install prisma@7 --save-exact --silent 2>&1 | tail -2
                          printf 'import { defineConfig } from \"prisma/config\";\nexport default defineConfig({ schema: \"prisma/schema.prisma\", migrations: { path: \"prisma/migrations\" }, datasource: { url: process.env.DB_URL } });' > prisma.config.ts
                          node_modules/.bin/prisma migrate deploy
                        " 2>&1 || \
                        echo "WARNING: Prisma migrate failed — check logs"

                      sudo docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" build --pull --no-cache
                      sudo docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" up -d --remove-orphans

                      # Wait for app readiness
                      max_attempts=120
                      ready=0
                      for i in $(seq 1 "${max_attempts}"); do
                        running="$(sudo docker inspect --format='{{.State.Running}}' minicms-app 2>/dev/null || echo false)"
                        health="$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' minicms-app 2>/dev/null || echo unknown)"

                        if [[ "${running}" != "true" ]]; then
                          sleep 2
                          continue
                        fi

                        if command -v curl >/dev/null 2>&1; then
                          http_code="$(curl -s -o /dev/null -m 2 -w "%{http_code}" http://127.0.0.1:3001/ 2>/dev/null || echo 000)"
                        else
                          http_code="$(sudo docker exec minicms-app node -e "fetch('http://127.0.0.1:3000/').then((r)=>process.stdout.write(String(r.status))).catch(()=>process.stdout.write('000'))" 2>/dev/null || echo 000)"
                        fi

                        if [[ "${http_code}" =~ ^[0-9]{3}$ ]] && [[ "${http_code}" -lt 500 ]] && [[ "${http_code}" -ne 000 ]]; then
                          echo "Container minicms-app responded with HTTP ${http_code}; continuing deployment."
                          ready=1
                          break
                        fi

                        if [[ "${health}" == "healthy" ]]; then
                          echo "Container minicms-app is healthy; continuing deployment."
                          ready=1
                          break
                        fi

                        sleep 2
                      done

                      if [[ "${ready}" -ne 1 ]]; then
                        echo "Container minicms-app did not become ready in time."
                        sudo docker inspect minicms-app --format='running={{.State.Running}} status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' || true
                        sudo docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" logs --tail=120 app || true
                        exit 1
                      fi

                      # Run database seed after successful deployment
                      echo "Running prisma seed..."
                      cd "${APP_DIR}"

                      # Pass DATABASE_URL via env var instead of modifying .env,
                      # so the app container keeps using DATABASE_URL_DOCKER on restart.
                      HOST_DB_URL="postgresql://${DB_USER}:${DB_PASS}@127.0.0.1:5434/${DB_NAME}?schema=public"
                      export DATABASE_URL="${HOST_DB_URL}"

                      npm run prisma:seed:once:vps

                      echo "Deployment finished for ${DOMAIN}."
