name: Deploy App to VPS

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
                uses: actions/checkout@v4

            - name: Set image name
                run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/2025-p4a-minicms-havlasmiskovska" >> "$GITHUB_ENV"

            - name: Login to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ${{ env.IMAGE_NAME }}
                    tags: |
                        type=raw,value=latest
                        type=sha,format=short

            - name: Build and push image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: ./Dockerfile
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}

            - name: Copy deployment files to VPS
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    source: "docker-compose.prod.yml,deploy/nginx/app.144-91-77-107.sslip.io.conf,deploy/vps/deploy.sh,.env.production.example"
                    target: "/tmp/minicms-deploy"

            - name: Deploy over SSH
                uses: appleboy/ssh-action@v1.2.0
                env:
                    CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
                    GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
                    GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                    NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
                    GITHUB_ID: ${{ secrets.APP_GITHUB_ID }}
                    GITHUB_SECRET: ${{ secrets.APP_GITHUB_SECRET }}
                with:
                    host: ${{ secrets.VPS_HOST }}
                    username: ${{ secrets.VPS_USER }}
                    key: ${{ secrets.VPS_SSH_KEY }}
                    envs: CERTBOT_EMAIL,GHCR_USERNAME,GHCR_TOKEN,NEXTAUTH_SECRET,GITHUB_ID,GITHUB_SECRET,IMAGE_NAME
                    script: |
                        set -euo pipefail
                        sudo mkdir -p /opt/minicms-app
                        sudo cp -r /tmp/minicms-deploy/* /opt/minicms-app/

                        sudo tee /opt/minicms-app/.env > /dev/null <<EOF
                        GHCR_IMAGE=${IMAGE_NAME}:latest
                        NODE_ENV=production
                        PORT=3000
                        DATABASE_URL=file:/app/data/prod.db
                        NEXTAUTH_URL=https://app.144-91-77-107.sslip.io
                        NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
                        GITHUB_ID=${GITHUB_ID}
                        GITHUB_SECRET=${GITHUB_SECRET}
                        EOF

                        cd /opt/minicms-app
                        sudo CERTBOT_EMAIL="${CERTBOT_EMAIL}" GHCR_USERNAME="${GHCR_USERNAME}" GHCR_TOKEN="${GHCR_TOKEN}" bash ./deploy/vps/deploy.sh
