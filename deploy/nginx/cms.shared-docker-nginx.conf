# CMS virtual host for a shared dockerized nginx reverse-proxy service.
#
# Requirements:
# 1) The CMS app is published on host port 3001 (docker-compose.prod.yml maps 3001:3000).
# 2) The nginx container has host-gateway mapping:
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
#
# This snippet is intended to be merged into an existing shared nginx config
# that already defines SSL certificates and any global map directives.

server {
    listen 80;
    server_name cms.144-91-77-107.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cms.144-91-77-107.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/144-91-77-107.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/144-91-77-107.sslip.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_connect_timeout 600;
    proxy_send_timeout    600;
    proxy_read_timeout    600;
    send_timeout          600;

    location / {
        proxy_pass         http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
